<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Mitigasi Kerawanan Beras - Rote Ndao</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #ef233c; --warning: #ffb703; --success: #2b9348;
            --dark: #2b2d42; --light: #edf2f4; --accent: #8d99ae;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; color: var(--dark); margin: 0; }
        .nav { background: var(--dark); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Interactive Map Replacement (Grid Panels) */
        .kecamatan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
        .kec-box { 
            padding: 15px; border-radius: 12px; border: 2px solid #eee; cursor: pointer; transition: all 0.3s;
            text-align: center; font-weight: 600; font-size: 0.9rem; background: white;
        }
        .kec-box:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .kec-box.active { border-color: var(--dark); background: #f8f9fa; }
        
        /* Stats */
        .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { padding: 15px; border-radius: 12px; color: white; }
        .val { font-size: 1.4rem; font-weight: 700; display: block; }
        .label { font-size: 0.75rem; opacity: 0.9; text-transform: uppercase; }

        /* Level Color Logic */
        .lvl-safe { background: var(--success); color: white; }
        .lvl-warn { background: var(--warning); color: #5c4200; }
        .lvl-crit { background: var(--danger); color: white; }

        .slider-wrap { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        input[type=range] { flex: 1; accent-color: var(--dark); }

        #detailKec { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="nav">
    <div>
        <h2 style="margin:0">Rice-Guard Rote Ndao</h2>
        <small>Sistem Kendali & Mitigasi Stok Beras</small>
    </div>
    <div id="yearDisplay" style="font-size: 1.5rem; font-weight: 700;">2026</div>
</div>

<div class="container">
    <div class="slider-wrap">
        <span>Pilih Tahun Analisis:</span>
        <input type="range" id="yearRange" min="2016" max="2026" value="2026">
        <span id="labelYear" style="font-weight: 700; width: 40px;">2026</span>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3 style="margin-top:0">Klik Kecamatan untuk Detail Analisis</h3>
            <div class="kecamatan-grid" id="kecGrid">
                <!-- Generated by JS -->
            </div>

            <div id="detailKec">
                <h4 id="selKecName">Pilih kecamatan di atas</h4>
                <div class="stat-row">
                    <div class="stat-box" id="boxPop" style="background: var(--dark)">
                        <span class="label">Penduduk</span>
                        <span class="val" id="valPop">0</span>
                    </div>
                    <div class="stat-box" id="boxNeed" style="background: #5a189a">
                        <span class="label">Kebutuhan (Ton)</span>
                        <span class="val" id="valNeed">0</span>
                    </div>
                    <div class="stat-box" id="boxStock">
                        <span class="label">Neraca Beras</span>
                        <span class="val" id="valDiff">0</span>
                    </div>
                </div>
                <div id="mitigasiAction" style="padding: 15px; border-radius: 8px; font-size: 0.9rem;"></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Faktor Kerentanan (%)</h3>
            <canvas id="radarChart"></canvas>
            <hr>
            <h4>Simulasi Neraca Tahunan</h4>
            <canvas id="barChart"></canvas>
        </div>
    </div>
</div>

<script>
    const KEC_DATA = [
        { name: "Lobalain", basePop: 30500, prodPower: 0.7 },
        { name: "Rote Tengah", basePop: 15200, prodPower: 1.4 },
        { name: "Rote Timur", basePop: 14800, prodPower: 1.3 },
        { name: "Rote Barat", basePop: 10200, prodPower: 0.5 },
        { name: "Rote Barat Daya", basePop: 24500, prodPower: 0.9 },
        { name: "Rote Barat Laut", basePop: 16100, prodPower: 1.1 },
        { name: "Pantai Baru", basePop: 26800, prodPower: 1.5 },
        { name: "Rote Selatan", basePop: 6100, prodPower: 0.8 },
        { name: "Landu Leko", basePop: 5400, prodPower: 0.4 },
        { name: "Ndao Nuse", basePop: 4200, prodPower: 0.1 }
    ];

    let selectedKec = KEC_DATA[0];
    let currentYear = 2026;

    // Inisialisasi Chart
    const ctxBar = document.getElementById('barChart').getContext('2d');
    const barChart = new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['Produksi', 'Konsumsi'],
            datasets: [{ label: 'Ton', data: [0,0], backgroundColor: [ '#2a9d8f', '#e63946'] }]
        }
    });

    const initKecGrid = () => {
        const grid = document.getElementById('kecGrid');
        grid.innerHTML = '';
        KEC_DATA.forEach(kec => {
            const div = document.createElement('div');
            div.className = 'kec-box';
            div.innerText = kec.name;
            div.onclick = () => selectKec(kec, div);
            grid.appendChild(div);
            
            // Hitung status warna box secara cepat
            const pop = Math.round(kec.basePop * Math.pow(1.012, (currentYear - 2020)));
            const need = (pop * 114) / 1000;
            const prod = (need * kec.prodPower) * (isElNino(currentYear) ? 0.6 : 1.1);
            if (prod < need) div.style.borderLeft = "6px solid var(--danger)";
            else div.style.borderLeft = "6px solid var(--success)";
        });
    };

    const isElNino = (y) => [2016, 2019, 2023, 2025, 2026].includes(y);

    const selectKec = (kec, element) => {
        selectedKec = kec;
        document.querySelectorAll('.kec-box').forEach(b => b.classList.remove('active'));
        if(element) element.classList.add('active');
        calculate();
    }

    const calculate = () => {
        const yearGap = currentYear - 2020;
        const pop = Math.round(selectedKec.basePop * Math.pow(1.012, yearGap));
        const need = Math.round((pop * 114) / 1000); // Konsumsi 114kg/kapita
        const climateFactor = isElNino(currentYear) ? 0.65 : 1.15;
        const prod = Math.round((need * selectedKec.prodPower) * climateFactor);
        const diff = prod - need;

        // Update UI
        document.getElementById('selKecName').innerText = `Kecamatan ${selectedKec.name}`;
        document.getElementById('valPop').innerText = pop.toLocaleString('id-ID');
        document.getElementById('valNeed').innerText = need.toLocaleString('id-ID');
        document.getElementById('valDiff').innerText = (diff > 0 ? "+" : "") + diff + " Ton";
        
        const boxDiff = document.getElementById('boxStock');
        const action = document.getElementById('mitigasiAction');

        if (diff < 0) {
            boxDiff.className = "stat-box lvl-crit";
            action.style.background = "#fff1f0";
            action.innerHTML = `<strong>Rekomendasi Mitigasi:</strong><br>🚨 Defisit Beras terdeteksi! Segera lakukan distribusi cadangan dari wilayah surplus atau ajukan dropping beras Bulog.`;
        } else {
            boxDiff.className = "stat-box lvl-safe";
            action.style.background = "#f6ffed";
            action.innerHTML = `<strong>Status Wilayah:</strong><br>✅ Aman. Wilayah ini berpotensi menjadi penyangga (buffer) untuk kecamatan tetangga yang defisit.`;
        }

        // Update Chart
        barChart.data.datasets[0].data = [prod, need];
        barChart.update();
    }

    document.getElementById('yearRange').oninput = (e) => {
        currentYear = parseInt(e.target.value);
        document.getElementById('labelYear').innerText = currentYear;
        document.getElementById('yearDisplay').innerText = currentYear;
        initKecGrid();
        calculate();
    }

    // Start
    initKecGrid();
    selectKec(KEC_DATA[0], document.querySelector('.kec-box'));
</script>

</body>
</html>
